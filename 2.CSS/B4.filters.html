<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FILTERS</title>
    <style>
        .container {
            border: 2px solid black;
            height: 500px;
            width: 98vw;
            margin: 0px 10px 10px 0px;
            background-color: lightgrey;
            display: flex;
            justify-content: center;
            align-items: center;

        }
        img {
            width: 500px;
        }
        .img1 {
            filter: blur(50px);
        }
        .img2 {
            filter: contrast(110%);
        }
        .img3 {
            filter: brightness(120%);
        }
        .img4 {
            filter: grayscale(100%);
        }
        .img5 {
             filter: sepia(90%);
        }
        .img6 {
            filter: hue-rotate(90deg);
        }
        .img7 {
            filter: drop-shadow(10px 10px 5px red);
            /* filter: drop-shadow(horizontal-shadow vertical-shadow blur-radius color); */
        }
        .img8 {
            filter: invert(100%);
        }
        .img9 {
            filter: opacity(0.5);
        }
        h1 {
            text-align: center;
            color: red;
        }
        h2 {
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>USE INSPECT TO SEE THE CHANGES AND EFFECTS</h1>
    <h2>1. BLUR</h2>
    <div class="container">
        <img class="img1" src="https://images.pexels.com/photos/1640773/pexels-photo-1640773.jpeg?cs=srgb&dl=pexels-ella-olsson-572949-1640773.jpg&fm=jpg" alt="">
    </div>
    <h2>2. CONTRAST</h2>
    <div class="container">
        <img class="img2" src="https://images.pexels.com/photos/1640773/pexels-photo-1640773.jpeg?cs=srgb&dl=pexels-ella-olsson-572949-1640773.jpg&fm=jpg" alt="">
    </div>
    <h2>3. BRIGHTNESS</h2>
    <div class="container">
        <img class="img3" src="https://images.pexels.com/photos/1640773/pexels-photo-1640773.jpeg?cs=srgb&dl=pexels-ella-olsson-572949-1640773.jpg&fm=jpg" alt="">
    </div>
    <h2>4. GREYSCALE</h2>
    <div class="container">
        <img class="img4" src="https://images.pexels.com/photos/1640773/pexels-photo-1640773.jpeg?cs=srgb&dl=pexels-ella-olsson-572949-1640773.jpg&fm=jpg" alt="">
    </div>
    <h2>5. SEPIA</h2>
    <div class="container">
        <img class="img5" src="https://images.pexels.com/photos/1640773/pexels-photo-1640773.jpeg?cs=srgb&dl=pexels-ella-olsson-572949-1640773.jpg&fm=jpg" alt="">
    </div>
    <h2>6. HUE ROTATE</h2>
    <div class="container">
        <img class="img6" src="https://images.pexels.com/photos/1640773/pexels-photo-1640773.jpeg?cs=srgb&dl=pexels-ella-olsson-572949-1640773.jpg&fm=jpg" alt="">
    </div>
    <h2>7. DROP SHADOW</h2>
    <div class="container">
        <img class="img7" src="https://images.pexels.com/photos/1640773/pexels-photo-1640773.jpeg?cs=srgb&dl=pexels-ella-olsson-572949-1640773.jpg&fm=jpg" alt="">
    </div>
    <h2>8. INVERT</h2>
    <div class="container">
        <img class="img8" src="https://images.pexels.com/photos/1640773/pexels-photo-1640773.jpeg?cs=srgb&dl=pexels-ella-olsson-572949-1640773.jpg&fm=jpg" alt="">
    </div>
    <h2>9. OPACITY</h2>
    <div class="container">
        <img class="img9" src="https://images.pexels.com/photos/1640773/pexels-photo-1640773.jpeg?cs=srgb&dl=pexels-ella-olsson-572949-1640773.jpg&fm=jpg" alt="">
    </div>
</body>
</html>
